<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry ❤️</title>
    <style>
        body {
            background-color: #ffe6ea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .content-container {
            position: relative;
            z-index: 5;
            background-color: rgba(255, 230, 234, 0.85);
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            color: #d6336c; 
            font-size: 3.5em;
            margin-bottom: 10px;
        }

        p {
            color: #a61e4d;
            font-size: 1.8em;
            margin-top: 0;
        }

        .hearts {
            font-size: 2.5em;
            margin: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .btn-container {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        /* Shared styles for both the real button and the fake button div */
        #btnYes, #btnNo {
            font-size: 1.5em;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }

        #btnYes {
            background-color: #ff758f;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 117, 143, 0.4);
            cursor: pointer;
        }

        #btnYes:hover {
            background-color: #ff4d6d;
            transform: scale(1.05);
        }

        /* Styling for the fake 'No' button */
        #btnNo {
            background-color: #f8f9fa;
            color: #495057;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            display: inline-block;
            cursor: default;
            user-select: none; /* Prevents her from accidentally highlighting the text while chasing it */
        }

        #btnVideo {
            display: none;
            background-color: #74c0fc;
            color: white;
            margin-top: 20px;
            font-size: 1.2em;
            padding: 10px 25px;
            box-shadow: 0 5px 12px rgba(116, 192, 252, 0.4);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        #btnVideo:hover {
            background-color: #228be6;
        }

        #videoWrapper {
            display: none;
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
        }

        #myVideo {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .memory-text {
            font-size: 0.9em;
            color: #a61e4d;
            font-style: italic;
            margin-top: 12px;
        }

        #successMessage {
            display: none;
            margin-top: 30px;
            font-size: 2.5em;
            color: #d6336c;
            font-weight: bold;
        }

        #homeButton {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 120px;
            height: auto;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        #homeButton:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        #timer {
            display: none;
            margin-top: 25px;
            font-size: 1.5em;
            color: #a61e4d;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(214, 51, 108, 0.1);
            line-height: 1.6;
        }

        .scattered-img {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <img src="pasta.png" id="homeButton" onclick="resetSite()" alt="Home Reset" title="Reset Website">

    <div class="content-container">
        <h1>I'm sorry baby ☹️</h1>
        <div class="hearts">💖💕💘💗💓💞💝</div>
        
        <div id="quizSection">
            <p>Do you still love me?</p>
            <div class="btn-container" id="buttons">
                <button id="btnYes" onclick="sayYes()">Yes!</button>
                <div id="btnNo" onmouseover="moveNo()">No</div>
            </div>
        </div>

        <div id="successMessage">
            Phew! I love you more! 🥰❤️❤️❤️
        </div>

        <div id="timer"></div>

        <button id="btnVideo" onclick="showVideo()">Watch Our Video 🎬</button>
        <div id="videoWrapper">
            <video id="myVideo" width="320" height="240" controls>
                <source src="041025.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <p class="memory-text">(can you believe we kissed for the first time later that day?)</p>
        </div>
    </div>

    <script>
        let timerInterval;

        window.onload = function() {
            scatterImages('nailong.png', 67);
            scatterImages('smiski.png', 67);
        };

        function scatterImages(src, count) {
            for (let i = 0; i < count; i++) {
                const img = document.createElement('img');
                img.src = src;
                img.classList.add('scattered-img');

                const size = Math.floor(Math.random() * 100) + 40;
                img.style.width = size + 'px';

                img.style.left = Math.random() * 90 + 'vw';
                img.style.top = Math.random() * 90 + 'vh';

                const rotation = Math.floor(Math.random() * 40) - 20;
                img.style.transform = `rotate(${rotation}deg)`;

                document.body.appendChild(img);
            }
        }

        function moveNo() {
            const btn = document.getElementById('btnNo');
            const maxX = window.innerWidth - btn.clientWidth - 40;
            const maxY = window.innerHeight - btn.clientHeight - 40;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function sayYes() {
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('btnVideo').style.display = 'inline-block';
            document.querySelector('.hearts').innerHTML = '❤️❤️❤️❤️❤️❤️❤️❤️❤️';
            
            startCountup();
        }

        function startCountup() {
            const startDate = new Date('2025-09-28T19:00:00');
            const timerElement = document.getElementById('timer');
            timerElement.style.display = 'block';

            clearInterval(timerInterval);

            timerInterval = setInterval(function() {
                const now = new Date();
                const difference = now - startDate;

                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                timerElement.innerHTML = `We've been loving each other for:<br><strong>${days}d : ${hours}h : ${minutes}m : ${seconds}s</strong><br>since Sept 28, 2025 @ 7PM ✨`;
            }, 1000);
        }

        function showVideo() {
            const wrapper = document.getElementById('videoWrapper');
            const video = document.getElementById('myVideo');
            
            wrapper.style.display = 'block';
            video.play();
        }

        function resetSite() {
            clearInterval(timerInterval);
            
            const video = document.getElementById('myVideo');
            video.pause();
            video.currentTime = 0;

            document.getElementById('quizSection').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('btnVideo').style.display = 'none';
            document.getElementById('videoWrapper').style.display = 'none';
            
            const btnNo = document.getElementById('btnNo');
            btnNo.style.position = 'relative';
            btnNo.style.left = 'auto';
            btnNo.style.top = 'auto';

            document.querySelector('.hearts').innerHTML = '💖💕💘💗💓💞💝';
        }
    </script>
</body>
</html>
